<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agricultura Familiar do Futuro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
    overflow:hidden;
}

/* Imagem de fundo */
.background{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.6)),
    url('https://images.unsplash.com/photo-1500937386664-56d1dfef3854?auto=format&fit=crop&w=1920&q=80');
    background-size:cover;
    background-position:center;
    z-index:-2;
}

/* Efeito futurista */
.background::after{
    content:'';
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    rgba(0,255,150,0.15),
    transparent 70%);
    animation:pulse 6s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

.container{
    width:90%;
    max-width:800px;
    padding:40px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    box-shadow:0 0 30px rgba(0,255,170,0.3);
}

h1{
    font-size:3rem;
    margin-bottom:20px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:#00ffae;
}

p{
    font-size:1.2rem;
    line-height:1.8;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:15px 35px;
    text-decoration:none;
    color:white;
    font-weight:bold;
    border-radius:50px;
    background:linear-gradient(45deg,#00ffae,#0088ff);
    transition:0.4s;
    box-shadow:0 0 20px rgba(0,255,174,0.5);
}

.btn:hover{
    transform:translateY(-5px) scale(1.05);
    box-shadow:0 0 35px rgba(0,255,174,0.9);
}

.btn:active{
    transform:scale(0.95);
}
</style>
</head>
<body>

<div class="background"></div>

<div class="container">
    <h1>Agricultura Familiar</h1>

    <p>
        A agricultura familiar é a base da produção sustentável,
        fortalecendo comunidades rurais, preservando tradições
        e impulsionando a inovação no campo para um futuro mais verde.
    </p>

    <a class="btn"
       href="https://www.gov.br/mda/pt-br"
       target="_blank">
       Saiba Mais
    </a>
</div>

</body>
</html>
